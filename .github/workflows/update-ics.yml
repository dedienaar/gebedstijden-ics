name: Update Prayer Times ICS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.2.0

      - run: uv run src/main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add export/prayer_times.ics

          git status

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: regenerate prayer times"
          git push origin HEAD
      
      - run: |
          git status --porcelain
          git diff --stat
          git diff --cached --stat

          echo "Working tree blob:"
          git hash-object export/prayer_times.ics

          echo "HEAD blob:"
          git rev-parse --verify HEAD:export/prayer_times.ics || echo "(not present in HEAD)"